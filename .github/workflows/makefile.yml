name: Build nflog_dns

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install build and test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install libtins-dev libnetfilter-log-dev libspdlog-dev python3 iproute2 iptables

    - name: Compile binary
      run: make

    - name: Run tests
      run: sudo bash test/run_tests.sh

    - name: Install binary
      run: sudo make install