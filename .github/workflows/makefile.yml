name: Build nflog_dns

on:
  push:
    branches:
    - '**'
    tags:
    - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install build and test dependencies
      run: sudo apt-get -y install libtins-dev libnetfilter-log-dev libspdlog-dev python3

    - name: Update version.h
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]
        then
          export VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >>$GITHUB_ENV
          echo "#define PROGRAM_VERSION \"${VERSION}\"" >version.h
          cat version.h

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [[ -n "$(git status --porcelain version.h)" ]]
          then
            git add version.h
            git commit -m "Update version.h to ${VERSION} [skip ci]"
            git push
          fi
        fi

    - name: Compile binary
      run: make

    - name: Run tests
      run: |
        sudo make test

    - name: Install binary
      run: sudo make install
